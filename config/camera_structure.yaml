# JetArm camera structure and calibration data.
# This file is intentionally separate from joint_servo_map.yaml.

metadata:
  version: 0.2
  status: orientation_model_partial
  camera_model: Gemini Pro Plus
  notes:
    - Camera line-of-sight pitch is currently derived from J2-J4 feedback.
    - Home is the measured zero-angle reference for the line of sight versus vertical.
    - Intrinsics and full hand-eye extrinsics still require calibration.
    - Keep camera mounting, intrinsics, extrinsics, and hand-eye calibration here.

camera_mount:
  type: eye_in_hand
  mounted_on: J5_J6_near_gripper
  description: Camera moves with the wrist/gripper and can see the gripper.
  orientation_model:
    home_line_of_sight_angle_from_vertical_deg: 0.0
    signed_pitch_formula: current_pitch_J2_J3_J4_minus_home_pitch_J2_J3_J4
    signed_pitch_positive_direction: toward_arm_radial_forward
    camera_view_up_at_home: base_link_positive_z
    agent_up_down_frame: camera_view

frames:
  color_frame: camera_color_optical_frame
  depth_frame: camera_depth_optical_frame
  target_base_frame: base_link

intrinsics:
  color: null
  depth: null

extrinsics:
  camera_to_base_link: null
  camera_to_tool0: null

depth_alignment:
  mode: null
  color_to_depth_offset_px:
    x: null
    y: null

calibration_targets:
  table_plane:
    frame: base_link
    equation: z = 0
  hand_eye:
    method: null
    sample_count: null
    reprojection_error: null
